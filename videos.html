<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videos aus unserer Playlist – Haufe X360</title>

<!-- =====================================================================
     KONFIGURATION  –  bei Bedarf hier anpassen
     =====================================================================
     YT_API_KEY:
       * LEER lassen  -> Seite nutzt den kostenlosen YouTube-RSS-Feed
                         (zeigt die im Feed verfügbaren Videos, OHNE Dauer-Badge).
       * API-Key eintragen -> zeigt zuverlässig die NEUESTEN Videos der Playlist
                         inkl. Laufzeit-Anzeige. Key erstellen unter
                         https://console.cloud.google.com  ->  "YouTube Data API v3"
                         aktivieren  ->  Anmeldedaten  ->  API-Schlüssel.
                         (Schlüssel ggf. per HTTP-Referrer auf eure Domain beschränken.)
     ===================================================================== -->
<script>
  const CONFIG = {
    YT_API_KEY:  "AIzaSyC3o0OWeG9EaDwxUvluDpT6JLAwgIpovEs",
    PLAYLIST_ID: "PLxDu1iW-PkWpTJLMgCXWeRKqzM0KnAxFU",
    PLAYLIST_URL:"https://www.youtube.com/playlist?list=PLxDu1iW-PkWpTJLMgCXWeRKqzM0KnAxFU",
    MAX_ITEMS:   6,
    PROXIES: [
      url => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
      url => "https://corsproxy.io/?url=" + encodeURIComponent(url),
      url => "https://thingproxy.freeboard.io/fetch/" + url
    ]
  };
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --orange:#FC7506;
    --lila:#1B0A32;
    --weiss:#FFFFFF;
    --orange-hell:#FFB380;
    --lavendel:#B6A2DE;
    --hellgrau:#F5F2F0;
    --text-muted:#6B6678;
    --border:#ECE9F0;
    --yt-red:#FF0033;
  }

  *{box-sizing:border-box;}

  html,body{height:auto;}
  body{
    margin:0;
    padding:0 5px 5px;          /* oben bündig (kein Leerraum), seitlich/unten etwas Luft für Schatten */
    overflow:hidden;            /* kein interner Scrollbalken */
    font-family:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    color:var(--lila);
    background:transparent;
    -webkit-font-smoothing:antialiased;
  }

  .x360-card{
    width:100%;                 /* füllt die volle Breite -> passt sich der Seite an */
    max-width:none;
    margin:0;
    background:var(--weiss);
    border:1px solid var(--border);
    border-radius:16px;
    box-shadow:0 3px 12px rgba(27,10,50,.06);
    overflow:hidden;
  }

  /* ---------- Kopfzeile ---------- */
  .x360-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:13px 18px 11px;
  }
  .x360-head-title{display:flex;align-items:center;gap:10px;min-width:0;}
  .x360-yt-ico{
    flex:0 0 auto;
    width:28px;height:20px;
    border-radius:6px;
    background:var(--yt-red);
    display:flex;align-items:center;justify-content:center;
  }
  .x360-yt-ico svg{width:11px;height:11px;}
  .x360-head h2{
    margin:0;
    font-size:13px;
    font-weight:800;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--lila);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .x360-shuffle{
    flex:0 0 auto;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12.5px;
    font-weight:700;
    color:var(--orange);
    background:none;
    border:none;
    cursor:pointer;
    padding:0;
    font-family:inherit;
    white-space:nowrap;
  }
  .x360-shuffle:hover{text-decoration:underline;}
  .x360-shuffle svg{width:15px;height:15px;}

  /* ---------- Grid ---------- */
  .x360-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);  /* immer 3 Spalten -> 6 Videos in 2 Reihen */
    gap:12px;
    padding:0 18px 6px;
  }
  @media (max-width:430px){ .x360-grid{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:280px){ .x360-grid{grid-template-columns:1fr;} }

  .x360-video{text-decoration:none;color:inherit;display:block;}
  .x360-thumb-wrap{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    border-radius:9px;
    overflow:hidden;
    background:var(--hellgrau);
  }
  .x360-thumb{
    width:100%;height:100%;
    object-fit:cover;
    display:block;
    transition:transform .25s ease;
  }
  .x360-video:hover .x360-thumb{transform:scale(1.05);}
  .x360-dur{
    position:absolute;
    right:6px;bottom:6px;
    background:rgba(27,10,50,.88);
    color:#fff;
    font-size:11px;
    font-weight:700;
    line-height:1;
    padding:3px 6px;
    border-radius:5px;
    letter-spacing:.02em;
  }
  .x360-play{
    position:absolute;
    inset:0;
    display:flex;align-items:center;justify-content:center;
    opacity:0;
    transition:opacity .2s ease;
    background:rgba(27,10,50,.18);
  }
  .x360-video:hover .x360-play{opacity:1;}
  .x360-play span{
    width:42px;height:42px;border-radius:50%;
    background:var(--yt-red);
    display:flex;align-items:center;justify-content:center;
  }
  .x360-play svg{width:16px;height:16px;}
  .x360-vtitle{
    margin-top:7px;
    font-size:12.5px;
    font-weight:700;
    line-height:1.3;
    color:var(--lila);
    display:-webkit-box;
    -webkit-line-clamp:2;
    line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    min-height:2.6em;           /* immer 2 Zeilen reservieren -> konstante Kartenhöhe */
  }
  .x360-video:hover .x360-vtitle{color:var(--orange);}

  /* ---------- Fußzeile ---------- */
  .x360-foot{
    margin-top:12px;
    border-top:1px solid var(--border);
    padding:10px 18px;
    text-align:center;
  }
  .x360-foot a{
    font-size:13px;font-weight:700;color:var(--orange);
    text-decoration:none;display:inline-flex;align-items:center;gap:6px;
  }
  .x360-foot a:hover{text-decoration:underline;}

  /* ---------- Status ---------- */
  .x360-state{padding:30px 20px;text-align:center;color:var(--text-muted);font-size:13.5px;line-height:1.5;}
  .x360-state a{color:var(--orange);font-weight:700;text-decoration:none;}

  /* Skeleton */
  .sk-card .sk-thumb{width:100%;aspect-ratio:16/9;border-radius:10px;}
  .sk-card .sk-line{height:11px;border-radius:6px;margin-top:9px;}
  .sk-card .sk-line.w80{width:80%;}
  .sk-thumb,.sk-line{
    background:linear-gradient(90deg,var(--hellgrau) 25%,#efeaf2 37%,var(--hellgrau) 63%);
    background-size:400% 100%;
    animation:sk 1.2s ease infinite;
  }
  @keyframes sk{0%{background-position:100% 0;}100%{background-position:-100% 0;}}
</style>
</head>

<body>
  <section class="x360-card" aria-label="Videos aus unserer Playlist">
    <div class="x360-head">
      <div class="x360-head-title">
        <span class="x360-yt-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="#fff" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>
        </span>
        <h2>Videos aus unserer Playlist</h2>
      </div>
      <button class="x360-shuffle" id="x360-shuffle" type="button" title="Zufällige Auswahl">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        Zufällig auswählen
      </button>
    </div>

    <div id="x360-content">
      <div class="x360-grid">
        <div class="sk-card"><div class="sk-thumb"></div><div class="sk-line"></div><div class="sk-line w80"></div></div>
        <div class="sk-card"><div class="sk-thumb"></div><div class="sk-line"></div><div class="sk-line w80"></div></div>
        <div class="sk-card"><div class="sk-thumb"></div><div class="sk-line"></div><div class="sk-line w80"></div></div>
        <div class="sk-card"><div class="sk-thumb"></div><div class="sk-line"></div><div class="sk-line w80"></div></div>
        <div class="sk-card"><div class="sk-thumb"></div><div class="sk-line"></div><div class="sk-line w80"></div></div>
        <div class="sk-card"><div class="sk-thumb"></div><div class="sk-line"></div><div class="sk-line w80"></div></div>
      </div>
    </div>

    <div class="x360-foot">
      <a id="x360-playlist" href="#" target="_blank" rel="noopener">
        Zur YouTube Playlist
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
      </a>
    </div>
  </section>

<script>
(function(){
  "use strict";

  const content  = document.getElementById("x360-content");
  const shuffleBtn = document.getElementById("x360-shuffle");
  document.getElementById("x360-playlist").href = CONFIG.PLAYLIST_URL;

  // Tatsächliche Inhaltshöhe an die einbettende Seite melden (für Auto-Resize des iframes)
  function reportHeight(){
    const h = Math.max(
      document.documentElement.scrollHeight,
      document.body ? document.body.scrollHeight : 0
    );
    try { parent.postMessage({ x360: "height", page: "videos", height: h }, "*"); } catch(e){}
  }
  window.addEventListener("load", reportHeight);
  window.addEventListener("resize", reportHeight);
  if (window.ResizeObserver){ new ResizeObserver(reportHeight).observe(document.documentElement); }

  let allVideos = [];   // gesamte geladene Liste {id,title,thumb,published,duration}
  let mode = "newest";  // "newest" | "random"

  // ---- Hilfsfunktionen -------------------------------------------------
  function decode(str){
    const t = document.createElement("textarea");
    t.innerHTML = str || "";
    return t.value;
  }

  function isoToReadable(iso){
    if(!iso) return "";
    const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
    if(!m) return "";
    const h = +(m[1]||0), min = +(m[2]||0), s = +(m[3]||0);
    const pad = n => String(n).padStart(2,"0");
    return h > 0 ? h + ":" + pad(min) + ":" + pad(s) : min + ":" + pad(s);
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  async function fetchWithTimeout(url, ms){
    const ctrl = new AbortController();
    const id = setTimeout(()=>ctrl.abort(), ms);
    try{
      const res = await fetch(url,{signal:ctrl.signal, cache:"no-store"});
      if(!res.ok) throw new Error("HTTP "+res.status);
      return res;
    } finally { clearTimeout(id); }
  }

  // ---- Variante A: YouTube Data API v3 ---------------------------------
  async function loadViaApi(){
    const key = CONFIG.YT_API_KEY.trim();
    let items = [], pageToken = "", pages = 0;

    do{
      const url = "https://www.googleapis.com/youtube/v3/playlistItems"
        + "?part=snippet,contentDetails&maxResults=50"
        + "&playlistId=" + encodeURIComponent(CONFIG.PLAYLIST_ID)
        + "&key=" + encodeURIComponent(key)
        + (pageToken ? "&pageToken=" + pageToken : "");
      const res  = await fetchWithTimeout(url, 9000);
      const data = await res.json();
      if(data.error) throw new Error(data.error.message || "API-Fehler");
      items = items.concat(data.items || []);
      pageToken = data.nextPageToken || "";
      pages++;
    } while(pageToken && pages < 6);   // bis zu 300 Videos

    let videos = items
      .filter(it => it.contentDetails && it.contentDetails.videoId)
      .filter(it => (it.snippet.title||"") !== "Private video" && (it.snippet.title||"") !== "Deleted video")
      .map(it => {
        const th = it.snippet.thumbnails || {};
        const pick = th.medium || th.high || th.standard || th.default || {};
        return {
          id: it.contentDetails.videoId,
          title: it.snippet.title || "",
          thumb: pick.url || "",
          published: it.contentDetails.videoPublishedAt || it.snippet.publishedAt || "",
          duration: ""
        };
      });

    // Laufzeiten in 50er-Blöcken nachladen
    for(let i=0;i<videos.length;i+=50){
      const batch = videos.slice(i,i+50);
      const url = "https://www.googleapis.com/youtube/v3/videos"
        + "?part=contentDetails&id=" + batch.map(v=>v.id).join(",")
        + "&key=" + encodeURIComponent(key);
      try{
        const res = await fetchWithTimeout(url, 9000);
        const data = await res.json();
        (data.items||[]).forEach(v=>{
          const found = videos.find(x=>x.id===v.id);
          if(found) found.duration = isoToReadable(v.contentDetails.duration);
        });
      }catch(e){ /* Dauer optional */ }
    }

    // Nach Veröffentlichungsdatum (neueste zuerst) sortieren
    videos.sort((a,b)=> new Date(b.published) - new Date(a.published));
    return videos;
  }

  // ---- Variante B: kostenloser RSS-Feed (ohne API-Key) -----------------
  async function loadViaRss(){
    const feed = "https://www.youtube.com/feeds/videos.xml?playlist_id=" + CONFIG.PLAYLIST_ID;
    let xml, lastErr;
    for(const makeUrl of CONFIG.PROXIES){
      try{
        const res  = await fetchWithTimeout(makeUrl(feed), 9000);
        const text = await res.text();
        xml = new DOMParser().parseFromString(text,"text/xml");
        if(xml.querySelector("parsererror")) throw new Error("XML parse error");
        if(!xml.getElementsByTagName("entry").length) throw new Error("Leerer Feed");
        break;
      }catch(e){ lastErr = e; xml = null; }
    }
    if(!xml) throw lastErr || new Error("Feed nicht erreichbar");

    const entries = Array.from(xml.getElementsByTagName("entry"));
    const videos = entries.map(en=>{
      const idEl = en.getElementsByTagName("yt:videoId")[0];
      const id   = idEl ? idEl.textContent : "";
      const titleEl = en.getElementsByTagName("media:title")[0] || en.getElementsByTagName("title")[0];
      const thumbEl = en.getElementsByTagName("media:thumbnail")[0];
      const pubEl   = en.getElementsByTagName("published")[0];
      return {
        id: id,
        title: decode(titleEl ? titleEl.textContent : ""),
        thumb: thumbEl ? thumbEl.getAttribute("url") : (id ? "https://i.ytimg.com/vi/"+id+"/hqdefault.jpg" : ""),
        published: pubEl ? pubEl.textContent : "",
        duration: ""   // im RSS-Feed nicht enthalten
      };
    }).filter(v=>v.id);

    videos.sort((a,b)=> new Date(b.published) - new Date(a.published));
    return videos;
  }

  // ---- Rendering -------------------------------------------------------
  function render(){
    if(!allVideos.length){ showError(); return; }
    const list = (mode === "random" ? shuffle(allVideos) : allVideos).slice(0, CONFIG.MAX_ITEMS);

    const grid = document.createElement("div");
    grid.className = "x360-grid";

    list.forEach(v=>{
      const a = document.createElement("a");
      a.className = "x360-video";
      a.href = "https://www.youtube.com/watch?v=" + v.id + "&list=" + CONFIG.PLAYLIST_ID;
      a.target = "_blank";
      a.rel = "noopener";
      a.innerHTML =
        '<div class="x360-thumb-wrap">' +
          '<img class="x360-thumb" loading="lazy" alt="" src="'+v.thumb+'" ' +
            'onerror="this.src=\'https://i.ytimg.com/vi/'+v.id+'/hqdefault.jpg\'">' +
          (v.duration ? '<span class="x360-dur">'+v.duration+'</span>' : '') +
          '<span class="x360-play"><span><svg viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg></span></span>' +
        '</div>' +
        '<div class="x360-vtitle">'+v.title+'</div>';
      grid.appendChild(a);
    });

    content.innerHTML = "";
    content.appendChild(grid);
    reportHeight();
  }

  function showError(){
    content.innerHTML =
      '<div class="x360-state">' +
      'Die Videos konnten gerade nicht geladen werden.<br>' +
      '<a href="'+CONFIG.PLAYLIST_URL+'" target="_blank" rel="noopener">Zur Playlist auf YouTube &rarr;</a>' +
      '</div>';
    reportHeight();
  }

  shuffleBtn.addEventListener("click", ()=>{
    if(!allVideos.length) return;
    mode = "random";
    render();
  });

  // ---- Start -----------------------------------------------------------
  const loader = CONFIG.YT_API_KEY.trim() ? loadViaApi() : loadViaRss();
  loader
    .then(videos=>{ allVideos = videos; mode = "newest"; render(); })
    .catch(err=>{ console.error(err); showError(); });
})();
</script>
</body>
</html>
